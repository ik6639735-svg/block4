{% extends "base.html" %}
{% block title %}Sign Up | QHive{% endblock %}
{% block content %}

<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card animate-card">
            
            <div class="auth-logo-section animate-logo">
                <div class="auth-logo-circle">
                    <div class="logo-pulse"></div>
                    <div class="logo-inner">
                        <svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" fill="rgba(0,0,0,0.15)" />
                            <line x1="35" y1="58" x2="35" y2="38" stroke="rgba(0,0,0,0.6)" stroke-width="4" stroke-linecap="round" />
                            <line x1="50" y1="62" x2="50" y2="32" stroke="rgba(0,0,0,0.7)" stroke-width="4" stroke-linecap="round" />
                            <line x1="65" y1="55" x2="65" y2="40" stroke="rgba(0,0,0,0.6)" stroke-width="4" stroke-linecap="round" />
                            <rect x="31" y="42" width="8" height="10" rx="2" fill="rgba(0,0,0,0.5)" />
                            <rect x="46" y="38" width="8" height="14" rx="2" fill="rgba(0,0,0,0.5)" />
                            <rect x="61" y="44" width="8" height="8" rx="2" fill="rgba(0,0,0,0.5)" />
                        </svg>
                    </div>
                </div>
                <h1 class="auth-title animate-text">Create Account</h1>
                <p class="auth-subtitle animate-text-delay">Start your trading journey with QHive</p>
            </div>
            
            <form class="auth-form" method="POST">
                <div class="input-float animate-input-1">
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="input-field-wrapper">
                        <input type="text" name="username" id="signupUsername" required minlength="3" placeholder=" ">
                        <label for="signupUsername">Username</label>
                        <div class="input-line"></div>
                    </div>
                </div>
                
                <div class="input-float animate-input-2">
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="input-field-wrapper">
                        <input type="email" name="email" id="signupEmail" required placeholder=" ">
                        <label for="signupEmail">Email address</label>
                        <div class="input-line"></div>
                    </div>
                </div>
                
                <div class="input-float animate-input-3">
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div class="input-field-wrapper">
                        <input type="password" name="password" id="signupPassword" required minlength="6" placeholder=" ">
                        <label for="signupPassword">Password (min 6 chars)</label>
                        <div class="input-line"></div>
                    </div>
                    <button type="button" class="password-toggle" onclick="toggleSignupPassword()">
                        <i class="fa-solid fa-eye" id="signupEyeIcon"></i>
                    </button>
                </div>
                
                <div class="animate-input-4">
                    <label class="checkbox-animated">
                        <input type="checkbox" required>
                        <span class="check-box">
                            <i class="fa-solid fa-check"></i>
                        </span>
                        <span>I agree to the <a href="{{ url_for('terms_page') }}" style="color:var(--gold);">Terms</a> and <a href="{{ url_for('privacy_page') }}" style="color:var(--gold);">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-login-animated animate-input-5">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-icon"><i class="fa-solid fa-arrow-right"></i></span>
                    <div class="btn-shine"></div>
                </button>
            </form>
            
            <div class="divider-animated animate-input-6">
                <div class="divider-line"></div>
                <span>or sign
